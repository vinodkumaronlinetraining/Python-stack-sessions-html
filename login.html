<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="wallet.css">
    <title>WalletApp-LoginForm</title>
</head>
<body>
    <header>
        <nav>
            <a href="login.html">Login</a> |
            <a href="dashboard.html">Home</a> |
            <a href="transaction.html">Transactions</a> |
            <a href="profile.html">Profile</a>
        </nav>
    </header>
    <hr>

    <main>
        <div id="login-page">
            <h1>Walletapp- Login here</h1>
            <section>
            <form method="post">
                <p>
                    <label for="first-name">First Name: </label>
                    <input type="text" id="first-name" name="firstname" placeholder="Enter First name" autofocus required>
                </p>

                <p>
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" placeholder="Enter Last Name" value="kumar">
                </p>

                <p>
                    <label for="address">Address:</label>
                    <input type="text" id="address" name="address" placeholder="Enter the address">
                </p>
                
                <p>
                    <label for="phone-number">Contact Number: </label>
                    <input type="tel" id="phone-number" name="number" placeholder="Enter a valid contact number">
                </p>
                
                <p>
                    <label for="account-type">Account Type:</label>
                    <select id="account-type">
                        <option>Standard</option>
                        <option>Premium</option>
                    </select>
                </p>


                <p>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="Password" placeholder="Enter password" minlength="8" required >
                </p>

                <p>
                    <a href="dashboard.html"><button type="submit">Login</button></a>
                    <!-- <button type="reset">Clear</button> -->
                </p>
                
            </form>
            </section>
            <section id="register-section">
                <h3>New user?</h3>

                <ul>
                    <li><strong>Standard</strong> - 2% fee, 10,000 limit</li>
                    <li><strong>Premium</strong> - 1% fee, 50,000 limit, cashback</li>
                </ul>

                <p>New user? <a href="#">Register Here</a></p>
            </section>
            
        </div>
    </main>
    <hr>

    <!-- Footer -->
    <footer>
        <small>wallet app &copy; 2026  | built by vinod</small>
    </footer>
</body>
</html>
